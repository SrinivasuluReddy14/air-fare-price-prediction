{% load static %}
<html>
<head>
<title>Flight Ticket Price Predictor</title>
<meta http-equiv="content-type" content="text/html; charset=utf-8" />
<link rel="stylesheet" type="text/css" href="{% static 'style.css' %}"/>
 <script LANGUAGE="Javascript" >
 function checkEmail(t3) {
	if (/^\w+([\.-]?\w+)*@\w+([\.-]?\w+)*(\.\w{2,3})+$/.test(t3)){
		return (true)
	}
	alert("Invalid E-mail Address! Please re-enter.")
	return (false);
}
function validate(){
	var x=document.forms["f1"]["t1"].value;
	var y=document.forms["f1"]["t2"].value;
	var contact=document.forms["f1"]["t3"].value;
	var email=document.forms["f1"]["t4"].value;
	var address=document.forms["f1"]["t5"].value;
	
	if(x == null || x==""){
		window.alert("Username must be enter");
		document.f1.t1.focus();
		return false;
	}
	if(y == null || y==""){
		window.alert("Password must be enter");
		document.f1.t2.focus();
		return false;
	}
	if(contact==0){
		alert("Please enter contact no");
		document.f1.t3.focus();
		return false;
	}
	if(isNaN(contact)){
		alert("Contact no  must be numeric");
		document.f1.t3.focus();
		return false;
	}
	if(contact.length != 10){
		alert("Contact number must be 10 digits long");
		document.f1.t3.focus();
		return false;
	}
	if(email==0){
		alert("Please Enter Email ID");
		document.f1.t4.focus();
		return false;
	}
	if(!checkEmail(email)){
		document.f1.t4.focus();
		return false;
	}
	if(address == null || address==""){
		window.alert("Address must be enter");
		document.f1.t5.focus();
		return false;
	}
	return true;
}
		
	
	</script>
</head>
</html>
</form>
</div>
<body>
<div id="wrapper">

    <div id="header">

        <div id="logo">
            ✈ Flight Ticket Price Predictor

            <div class="subtitle">
                Machine Learning Based Airline Fare Prediction System
            </div>
        </div>

    </div>

    <div id="menu">

        <ul>

            <li>
                <a href="{% url 'index' %}">
                    Home
                </a>
            </li>

            <li>
                <a href="{% url 'UserLogin' %}">
                    Login
                </a>
            </li>

            <li>
                <a href="{% url 'Signup' %}">
                    Register
                </a>
            </li>

        </ul>

    </div>

    <div class="form-card">

        <h2>New User Registration</h2>

        <p>{{ data }}</p>

        <form
            name="f1"
            method="post"
            action="{% url 'SignupAction' %}"
            onsubmit="return validate()">

            {% csrf_token %}

            <label>Username</label>
            <input type="text" name="t1">

            <br><br>

            <label>Password</label>
            <input type="password" name="t2">

            <br><br>

            <label>Contact Number</label>
            <input type="text" name="t3">

            <br><br>

            <label>Email ID</label>
            <input type="email" name="t4">

            <br><br>

            <label>Address</label>
            <input type="text" name="t5">

            <br><br>

            <input type="submit" value="Create Account">

        </form>

    </div>

</div>
</body>
</html>
